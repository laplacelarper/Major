# Default configuration for Physics-Informed Sonar Detection System

# Physics parameters for synthetic data generation
physics:
  cosine_exponent_range: [2.0, 8.0]
  base_intensity_range: [0.3, 0.8]
  range_min_m: 10.0
  range_max_m: 200.0
  attenuation_coefficient: 2.0
  shadow_length_factor: 3.0
  shadow_intensity_factor: 0.1
  speckle_noise_type: "rayleigh"
  noise_level_range: [0.1, 0.4]
  texture_roughness_range: [0.2, 0.8]
  texture_scale_range: [5.0, 20.0]
  grazing_angle_range: [10.0, 80.0]
  frequency_khz_range: [100.0, 500.0]
  beam_width_deg_range: [1.0, 5.0]

# Model architecture configuration
model:
  model_type: "unet"  # "unet", "resnet18", "efficientnet-b0"
  num_classes: 2
  input_channels: 1
  dropout_rate: 0.1
  mc_samples: 20
  use_uncertainty: true
  use_physics_metadata: true
  metadata_dim: 7
  output_mode: "classification"  # "classification" or "segmentation"

# Training pipeline configuration
training:
  # Phase 1: Synthetic pretraining
  phase1_epochs: 100
  phase1_lr: 0.001
  phase1_batch_size: 16
  phase1_weight_decay: 0.0001
  
  # Phase 2: Real data fine-tuning
  phase2_epochs: 50
  phase2_lr: 0.00001
  phase2_batch_size: 8
  phase2_freeze_layers: 3
  
  # Phase 3: Uncertainty calibration
  phase3_epochs: 20
  phase3_lr: 0.000001
  phase3_batch_size: 8
  
  # General parameters
  early_stopping_patience: 10
  checkpoint_frequency: 5
  validation_split: 0.2
  optimizer: "adam"
  scheduler: "cosine"
  gradient_clip_norm: 1.0

# Data configuration
data:
  image_size: [512, 512]
  image_channels: 1
  synthetic_dataset_size: 10000
  real_data_percentage: 0.3
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  use_augmentation: true
  rotation_range: 30.0
  flip_probability: 0.5
  noise_injection_prob: 0.3
  normalize_images: true
  normalization_mean: 0.5
  normalization_std: 0.5
  real_datasets:
    - "minehunting_sonar"
    - "cmre_muscle_sas"

# Paths (relative to project root)
data_dir: "data"
output_dir: "outputs"
checkpoint_dir: "checkpoints"
logs_dir: "logs"
config_dir: "configs"

# Reproducibility
random_seed: 42
deterministic: true

# Logging
log_level: "INFO"
log_to_file: true
log_to_console: true

# Hardware
device: "auto"  # "auto", "cpu", "cuda"
num_workers: 4
pin_memory: true

# Experiment tracking
experiment_name: "sonar_detection"
run_name: null  # Will be auto-generated if null
tags: []